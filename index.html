<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- The description meta tag is used to provide a brief summary of the content of the page to (SEO). -->
    <meta name="description" content="a portfolio website for Hassan Hanboly, a web developer.">
    <title>Portfolio | Hassan</title>
    <!-- The keywords meta tag is used to specify a list of keywords that are relevant to the content of the page. -->
    <meta name="keywords" content="HTML, CSS, JavaScript, Web Development, Portfolio, Hassan Hanboly">
    <meta name="author" content="Hassan Hanboly">
    <!-- icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons//apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <!-- External resources -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="site">

        <header class="header">
            <div class="header__container">
                <div class="header__inner">

                    <a href="#home" class="logo">Hassan Hanboly</a>

                    <!-- Burger Menu -->
                    <button class="nav-toggle" aria-label="Toggle navigation">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </button>

                    <nav class="nav" aria-label="Main Navigation">
                        <ul class="nav__list">

                            <li class="nav__item">
                                <a class="nav__link" href="#home">Home</a>
                            </li>
                            <li class="nav__item">
                                <a class="nav__link" href="#services">Services</a>
                            </li>
                            <li class="nav__item">
                                <a class="nav__link" href="#projects">Projects</a>
                            </li>
                            <li class="nav__item">
                                <a class="nav__link" href="#contact">Contact</a>
                            </li>

                        </ul>
                    </nav>

                    <!-- Overlay -->
                    <div class="overlay"></div>

                </div>
            </div>
        </header>

        <main>

            <section class="hero" id="home">
                <div class="container">
                    <div class="hero__inner">
                        <div class="hero__content">

                            <h1 class="hero__title">Hi, I'm Hassan Hanboly</h1>
                            <p class="hero__text">A passionate web developer creating modern and responsive websites.</p>
                            <a href="#projects" class="btn btn-primary">View My Work</a>                                           

                        </div>
                    </div>
                </div>
            </section>

            <section class="services" id="services">
                <div class="container">
                    <div class="services__inner">
                        <div class="services__content">

                            <h2 class="services__title">services</h2>

                        </div>
                    </div>
                </div>
            </section>

            <section class="projects" id="projects">
                <div class="container">
                    <div class="projects__inner">
                        <div class="projects__content">
                            
                            <h2 class="projects__title">projects</h2>

                        </div>
                    </div>
                </div>
            </section>

            <section class="contact" id="contact">
                <div class="container">
                    <div class="contact__inner">
                        <div class="contact__content">

                            <h2 class="contact__title">Contact</h2>                           
                            
                        </div>
                    </div>
                </div>
            </section>

        </main>
        
        <footer class="footer">
            <div class="container">
                <div class="footer__inner">

                    <div class="footer__content">
                        <p>&copy; 2024 Hassan Hanboly. All rights reserved.</p>
                    </div>

                </div>
            </div>
        </footer>
    
    </div>


    <script>
        /* Patterns --> State Class Pattern */
        /* openMenu & closeMenu Logic */

        const toggle = document.querySelector(".nav-toggle");
        const nav = document.querySelector(".nav");
        const overlay = document.querySelector(".overlay");
        const links = document.querySelectorAll(".nav a");

        function openMenu() {
            toggle.classList.add("active");
            nav.classList.add("active");
            overlay.classList.add("active");
            document.body.classList.add("no-scroll");
        }

        function closeMenu() {
            toggle.classList.remove("active");
            nav.classList.remove("active");
            overlay.classList.remove("active");
            document.body.classList.remove("no-scroll");
        }

        toggle.addEventListener("click", () => {
            nav.classList.contains("active") ? closeMenu() : openMenu();
        });

        overlay.addEventListener("click", closeMenu);

        links.forEach(link => {
            link.addEventListener("click", closeMenu);
        });

        /* إغلاق القائمة بزر ESC */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeMenu();
            }
        });

    </script>
    
</body>
</html>
